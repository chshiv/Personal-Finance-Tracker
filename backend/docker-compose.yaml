version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: finance_tracker_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/init:/docker-entrypoint-initdb.d
    networks:
      - finance_net

  redis:
    image: redis:7
    container_name: finance_tracker_redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - finance_net

volumes:
  pgdata:

networks:
  finance_net: