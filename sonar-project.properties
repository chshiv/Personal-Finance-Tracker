# sonar-project.properties
sonar.projectKey=full-stack-finance-tracker
sonar.projectName=full stack finance tracker
sonar.projectVersion=1.0

# -----------------------------------------------
# SOURCES
# Tell Sonar where frontend and backend code live
# Adjust folder names to match your actual structure
# -----------------------------------------------
sonar.sources=frontend/src,backend/src

# Test directories (analyzed separately, not as main code)
sonar.tests=frontend/src,backend/src

# Test file patterns
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# -----------------------------------------------
# EXCLUSIONS
# -----------------------------------------------
sonar.exclusions=\
  **/node_modules/**, \
  **/dist/**, \
  **/build/**, \
  **/coverage/**, \
  **/.next/**, \
  **/public/**, \
  **/*.config.js, \
  **/*.config.ts

# -----------------------------------------------
# COVERAGE REPORTS
# Frontend (React/Jest) + Backend (Jest/Mocha) paths
# -----------------------------------------------
sonar.javascript.lcov.reportPaths=\
  frontend/coverage/lcov.info, \
  backend/coverage/lcov.info

# -----------------------------------------------
# LANGUAGE
# -----------------------------------------------
sonar.language=js
sonar.sourceEncoding=UTF-8

# -----------------------------------------------
# TYPESCRIPT (if you use .tsx / .ts files in React)
# -----------------------------------------------
# sonar.typescript.tsconfigPath=frontend/tsconfig.json